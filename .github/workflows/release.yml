# Publish to PyPI when a version tag (vX.Y.Z) is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in GitHub.
# ONE-TIME SETUP on pypi.org (Account/Project → Publishing → Add a pending publisher):
#   - PyPI project name: delve-taxonomy
#   - Owner:             andrestorres123
#   - Repository:        delve-taxonomy
#   - Workflow name:     release.yml
#   - Environment:       pypi
#
# To cut a release: bump `version` in pyproject.toml, commit, then
#   git tag vX.Y.Z && git push origin vX.Y.Z
# The tag must match the pyproject version or the build fails fast.

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$TAG pyproject=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject version $VERSION"
            exit 1
          fi
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
