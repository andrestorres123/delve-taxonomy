# CI: lint, type-check (non-blocking), spell-check, and unit tests.
# Unit tests run without API keys — no live LLM calls in this workflow.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch: # Allows triggering the workflow manually in GitHub UI

# If another push to the same PR or branch happens while this workflow is still running,
# cancel the earlier run in favor of the next run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies (from lockfile)
        # --frozen installs the exact versions in uv.lock and fails if the lock
        # is out of date with pyproject.toml, so CI is fully reproducible.
        run: uv sync --frozen --extra dev
      - name: Lint with ruff
        run: uv run ruff check src/
      - name: Type-check with mypy
        run: uv run mypy src/
      - name: Check spelling
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_file: .codespellignore
          path: README.md src/
      - name: Run unit tests
        run: uv run pytest tests/unit_tests
